<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF5E8;
    --cream-darker: #F0E8D2;
    --earth: #8B6F47;
    --earth-dark: #6B5435;
    --olive: #6B7F4F;
    --olive-dark: #4F5F38;
    --ink: #2C2C2C;
    --soft: #D4C5A0;
    --hairline: #D8CFB8;
    --white: #FFFFFF;
    --danger: #B85C3C;
    --display: 'Cormorant Garamond', Georgia, serif;
    --body: 'Inter', -apple-system, system-ui, sans-serif;
    --radius: 8px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: contain;
  }
  body { padding-bottom: 120px; }
  .app { max-width: 440px; margin: 0 auto; background: var(--cream); min-height: 100vh; position: relative; }
  .header { padding: 28px 20px 20px; text-align: center; border-bottom: 1px solid var(--hairline); }
  .header h1 { font-family: var(--display); font-size: 34px; font-weight: 500; letter-spacing: -0.5px; color: var(--ink); line-height: 1; }
  .header h1 .deli { font-weight: 700; }
  .header .slogan { font-family: var(--display); font-style: italic; font-size: 17px; color: var(--olive); margin-top: 6px; letter-spacing: 0.5px; }
  .header .subtitle { font-size: 12px; color: var(--earth); margin-top: 8px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }
  .section { padding: 24px 20px; border-bottom: 1px solid var(--hairline); }
  .section-title { font-family: var(--display); font-size: 11px; font-weight: 600; color: var(--earth); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; display: inline-block; width: 18px; height: 1px; background: var(--earth); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--ink); opacity: 0.65; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
  .field input, .field select { width: 100%; background: var(--white); border: 1px solid var(--hairline); border-radius: var(--radius-sm); padding: 11px 12px; font-family: var(--body); font-size: 16px; color: var(--ink); -webkit-appearance: none; appearance: none; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--earth); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .category { margin-bottom: 8px; }
  .category-header { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 0 10px; border-bottom: 1px solid var(--hairline); margin-bottom: 8px; cursor: pointer; }
  .category-name { font-family: var(--display); font-size: 22px; font-weight: 500; color: var(--ink); letter-spacing: 0.5px; }
  .category-toggle { color: var(--earth); font-size: 18px; transition: transform 0.2s; }
  .category.collapsed .category-toggle { transform: rotate(-90deg); }
  .category.collapsed .category-items { display: none; }
  .item { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 10px 0; align-items: center; border-bottom: 1px dotted var(--hairline); }
  .item:last-child { border-bottom: none; }
  .item-info { min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .item-meta { font-size: 12px; color: var(--ink); opacity: 0.55; margin-top: 2px; font-family: var(--body); }
  .item-meta .price { color: var(--earth); font-weight: 600; opacity: 1; }
  .stepper { display: flex; align-items: center; gap: 2px; background: var(--cream-darker); border-radius: var(--radius-sm); padding: 2px; }
  .step-btn { width: 32px; height: 32px; border: none; background: transparent; color: var(--earth); font-size: 20px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; transition: background 0.15s; font-family: var(--body); -webkit-user-select: none; user-select: none; }
  .step-btn:active { background: var(--soft); }
  .step-btn:disabled { color: var(--hairline); cursor: not-allowed; }
  .step-qty { min-width: 36px; text-align: center; font-weight: 600; font-size: 15px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .item.has-qty { background: linear-gradient(90deg, rgba(107, 127, 79, 0.06) 0%, transparent 100%); }
  .item.has-qty .item-name { color: var(--olive-dark); }
  .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: var(--cream); padding: 14px 20px; z-index: 100; box-shadow: 0 -8px 24px rgba(0,0,0,0.18); }
  .footer-bar-inner { max-width: 440px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
  .footer-total { font-family: var(--display); font-size: 13px; color: var(--soft); letter-spacing: 1px; text-transform: uppercase; }
  .footer-total .amount { display: block; font-size: 26px; color: var(--cream); font-weight: 600; margin-top: 2px; font-family: var(--body); font-variant-numeric: tabular-nums; }
  .btn { background: var(--olive); color: var(--cream); border: none; padding: 14px 22px; border-radius: var(--radius); font-family: var(--body); font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: background 0.15s, transform 0.1s; flex-shrink: 0; }
  .btn:active { transform: scale(0.97); }
  .btn-secondary { background: transparent; color: var(--cream); border: 1px solid var(--soft); padding: 10px 14px; font-size: 12px; }
  .actions { padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 12px; }
  .actions .btn { width: 100%; padding: 16px; font-size: 15px; }
  .btn-reset { background: transparent; color: var(--earth); border: 1px solid var(--hairline); }
  #pdf-output { position: absolute; left: -9999px; top: 0; width: 794px; background: #FFFFFF; padding: 50px 60px; color: var(--ink); font-family: var(--body); box-sizing: border-box; }
  .pdf-header { text-align: center; border-bottom: 2px solid var(--earth); padding-bottom: 24px; margin-bottom: 28px; }
  .pdf-logo-text { font-family: var(--display); font-size: 42px; color: var(--ink); line-height: 1; }
  .pdf-logo-text .deli { font-weight: 700; }
  .pdf-slogan { font-family: var(--display); font-style: italic; font-size: 18px; color: var(--olive); margin-top: 8px; }
  .pdf-subtitle { font-size: 13px; color: var(--earth); text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
  .pdf-section { margin-bottom: 24px; }
  .pdf-section-title { font-family: var(--display); font-size: 18px; color: var(--earth); text-transform: uppercase; letter-spacing: 2px; padding-bottom: 6px; border-bottom: 1px solid var(--hairline); margin-bottom: 14px; font-weight: 600; }
  .pdf-client-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
  .pdf-field { padding: 8px 0; }
  .pdf-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--earth); margin-bottom: 2px; font-weight: 600; }
  .pdf-field-value { font-size: 15px; color: var(--ink); font-weight: 500; }
  .pdf-concept { background: var(--cream); padding: 22px 26px; border-left: 3px solid var(--olive); font-family: var(--display); font-size: 15px; line-height: 1.7; color: var(--ink); }
  .pdf-concept p { margin-bottom: 10px; }
  .pdf-concept p:last-child { margin-bottom: 0; }
  .pdf-concept .em { font-style: italic; color: var(--olive-dark); }
  .pdf-menu-category { margin-bottom: 18px; }
  .pdf-category-name { font-family: var(--display); font-size: 18px; color: var(--ink); border-bottom: 1px solid var(--soft); padding-bottom: 4px; margin-bottom: 10px; font-weight: 600; }
  .pdf-item { display: grid; grid-template-columns: 1fr auto auto auto; gap: 16px; padding: 7px 0; border-bottom: 1px dotted var(--hairline); font-size: 13px; }
  .pdf-item:last-child { border-bottom: none; }
  .pdf-item-name { font-weight: 500; }
  .pdf-item-unit { color: var(--ink); opacity: 0.6; font-size: 12px; }
  .pdf-item-qty { text-align: right; font-variant-numeric: tabular-nums; color: var(--earth); font-weight: 600; }
  .pdf-item-total { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); min-width: 70px; }
  .pdf-summary { background: var(--cream); padding: 20px 26px; border-radius: var(--radius); margin-top: 20px; }
  .pdf-summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
  .pdf-summary-row.total { font-family: var(--display); font-size: 22px; color: var(--earth); font-weight: 600; border-top: 1px solid var(--earth); margin-top: 8px; padding-top: 14px; }
  .pdf-summary-row.total .amount { font-family: var(--body); font-variant-numeric: tabular-nums; font-weight: 700; }
  .pdf-how { font-size: 13px; line-height: 1.7; }
  .pdf-how ul { list-style: none; padding: 0; }
  .pdf-how li { padding: 4px 0; padding-left: 18px; position: relative; }
  .pdf-how li::before { content: '·'; color: var(--olive); position: absolute; left: 6px; font-size: 22px; line-height: 1; top: -2px; }
  .pdf-footer { text-align: center; margin-top: 30px; padding-top: 24px; border-top: 1px solid var(--hairline); font-family: var(--display); font-style: italic; font-size: 14px; color: var(--olive); line-height: 1.6; }
  .pdf-footer .signature { margin-top: 14px; font-style: normal; font-size: 18px; font-weight: 600; color: var(--earth); letter-spacing: 2px; }
  .empty-prompt { text-align: center; padding: 60px 20px; color: var(--earth); font-family: var(--display); font-style: italic; font-size: 16px; }
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--olive); color: var(--cream); padding: 14px 22px; border-radius: var(--radius); font-size: 14px; font-weight: 500; box-shadow: 0 8px 20px rgba(0,0,0,0.2); z-index: 200; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .logo-placeholder { width: 100%; height: 70px; background: var(--cream-darker); border: 1px dashed var(--soft); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--earth); font-family: var(--display); font-style: italic; font-size: 14px; margin-bottom: 12px; }
  @media (min-width: 480px) { .app { box-shadow: 0 0 40px rgba(0,0,0,0.06); } }
  @page { size: A4 portrait; margin: 0; }
  @media print {
    html, body { background: #FFFFFF !important; padding: 0 !important; margin: 0 !important; }
    .app, .footer-bar, .actions, .toast { display: none !important; }
    #pdf-output { position: static !important; left: 0 !important; top: 0 !important; width: 100% !important; max-width: 100% !important; padding: 18mm 16mm !important; margin: 0 !important; background: #FFFFFF !important; visibility: visible !important; display: block !important; color: #2C2C2C !important; box-shadow: none !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    .pdf-section, .pdf-menu-category, .pdf-summary { break-inside: avoid; page-break-inside: avoid; }
    .pdf-header { break-after: avoid; page-break-after: avoid; }
    .pdf-footer { break-before: avoid; page-break-before: avoid; }
  }
</style>

<div class="app" id="app">

    <div class="field-row">

    </div>
    <div class="field"><label for="proposal-lang">Proposal language</label><select id="proposal-lang"><option value="EN" selected>English</option><option value="ES">Español</option></select></div>

  <section class="section">

    <div id="menu-container"></div>
  </section>
  <section class="section">
    <h2 class="section-title">Beverages</h2>
    <p style="font-size: 13px; color: var(--ink); opacity: 0.7; margin-bottom: 16px; font-style: italic;">House bottles are 330ml. Lemonade is 1L. Water is 500ml. Wine bottles serve ~5.</p>
    <div id="beverages-container"></div>
  </section>
  <div class="actions">
    <button class="btn" onclick="generatePDF()">📄 Save as PDF</button>
    <button class="btn btn-reset" onclick="resetAll()">Clear All</button>
  </div>
</div>
<div class="footer-bar">
  <div class="footer-bar-inner">
    <div class="footer-total">Total<span class="amount" id="footer-total">€0</span></div>
    <button class="btn" onclick="generatePDF()">Save as PDF</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="pdf-output"></div>

const FOOD_CATEGORIES = ['Dips','Starters','Salads','Mini Pita Trays','From Deli','Soups','Sweets'];
const BEVERAGE_CATEGORIES = ['House Specials','Water','Wine','Beer','Cocktails'];
const state = { quantities: {}, lang: 'EN' };
const COPY = {
  EN: {
    sectionClient:'Client Details',sectionTable:'The Table',sectionBeverages:'Beverages',
    eventProposal:'EVENT PROPOSAL',clientName:'Client',eventDate:'Date',location:'Location',
    guests:'Guests',timeOfDay:'Time',phone:'Phone',theConcept:'The Concept',yourTable:'Your Table',
    yourBeverages:'Beverages',investment:'Your Investment',totalEvent:'Total Event Price',
    howItWorks:'How It Works',toReserve:'To Reserve',closingSlogan:'Fresh · Healthy · Happy',
    closing:"We don't take shortcuts. Every spread, salad, and tray is prepared in our family kitchen by the old church in Santa María del Camí.",
    conceptText:['Food is better when shared.',"At Deli Santa Maria, we don't prepare individual plates. We prepare tables.",'Tables filled with colourful salads, fresh breads, homemade spreads, warm dishes, and the aromas of a Levantine family kitchen — recipes our family brought from the Levant to a Mallorcan village, prepared fresh and meant to be shared.','Food made for conversation. Food made for laughter. Food made for people gathering together.','We bring the table to you. You bring the people.'],

    quantity:'Qty',total:'Total',food:'Food',beverages:'Beverages',fileName:'Deli_Santa_Maria_Proposal',

  ES: {
    sectionClient:'Datos del Cliente',sectionTable:'La Mesa',sectionBeverages:'Bebidas',

    guests:'Invitados',timeOfDay:'Hora',phone:'Teléfono',theConcept:'El Concepto',yourTable:'Tu Mesa',
    yourBeverages:'Bebidas',investment:'Tu Inversión',totalEvent:'Precio Total del Evento',
    howItWorks:'Cómo Funciona',toReserve:'Para Reservar',closingSlogan:'Fresco · Sano · Feliz',
    closing:'No tomamos atajos. Cada crema, ensalada y bandeja se prepara en nuestra cocina familiar junto a la iglesia vieja en Santa María del Camí.',

    howItems:['Entrega lista — traemos tu mesa preparada para servir.','Sin camareros, sin platos, sin complicaciones.','Tiempo de aviso: 5–7 días para reservas confirmadas.','Depósito del 30% confirma tu evento.','Peticiones especiales bienvenidas — vegano, sin gluten, dietéticas.'],
    reserveText:"WhatsApp +34 628 00 80 66\nCarrer de l'Església — Santa María del Camí",
    subtitle:"Una cocina familiar levantina en Santa María del Camí",
    quantity:'Cant.',total:'Total',food:'Comida',beverages:'Bebidas',fileName:'Deli_Santa_Maria_Propuesta',

};
function loadState(){try{const s=sessionStorage.getItem('deli-event-state');if(s){Object.assign(state,JSON.parse(s));}}catch(e){}}
function saveState(){try{sessionStorage.setItem('deli-event-state',JSON.stringify(state));}catch(e){}}
function renderMenu(){
  const lang=document.getElementById('proposal-lang').value;
  state.lang=lang;
  const foodContainer=document.getElementById('menu-container');
  foodContainer.innerHTML='';
  FOOD_CATEGORIES.forEach(catName=>{
    const items=MENU.food.filter(item=>item.cat===catName);
    if(items.length===0)return;
    const catDiv=document.createElement('div');
    catDiv.className='category';
    catDiv.innerHTML=`<div class="category-header" onclick="toggleCategory(this)"><div class="category-name">${catName}</div><div class="category-toggle">▼</div></div><div class="category-items"></div>`;
    const itemsDiv=catDiv.querySelector('.category-items');
    items.forEach(item=>{itemsDiv.appendChild(renderItem(item,'food'));});
    foodContainer.appendChild(catDiv);
  });
  const bevContainer=document.getElementById('beverages-container');
  bevContainer.innerHTML='';
  BEVERAGE_CATEGORIES.forEach(catName=>{
    const items=MENU.beverages.filter(item=>item.cat===catName);
    if(items.length===0)return;
    const catDiv=document.createElement('div');
    catDiv.className='category';
    catDiv.innerHTML=`<div class="category-header" onclick="toggleCategory(this)"><div class="category-name">${catName}</div><div class="category-toggle">▼</div></div><div class="category-items"></div>`;
    const itemsDiv=catDiv.querySelector('.category-items');
    items.forEach(item=>{itemsDiv.appendChild(renderItem(item,'beverage'));});
    bevContainer.appendChild(catDiv);
  });
  updateTotals();
}
function renderItem(item,type){
  const div=document.createElement('div');
  div.className='item';
  div.dataset.itemId=item.id;
  div.dataset.itemType=type;
  const qty=state.quantities[item.id]||0;
  if(qty>0)div.classList.add('has-qty');
  const name=state.lang==='ES'?item.name_es:item.name_en;
  const unit=state.lang==='ES'?item.unit_es:item.unit_en;
  div.innerHTML=`<div class="item-info"><div class="item-name">${name}</div><div class="item-meta">${unit} · <span class="price">€${item.price.toFixed(2)}</span></div></div><div class="stepper"><button class="step-btn" onclick="step('${item.id}',-1)">−</button><div class="step-qty" id="qty-${item.id}">${qty}</div><button class="step-btn" onclick="step('${item.id}',1)">+</button></div>`;
  return div;
}
function toggleCategory(headerEl){headerEl.parentElement.classList.toggle('collapsed');}
function step(itemId,delta){
  const cur=state.quantities[itemId]||0;
  const next=Math.max(0,cur+delta);
  state.quantities[itemId]=next;
  const qEl=document.getElementById('qty-'+itemId);
  if(qEl)qEl.textContent=next;
  const itemEl=document.querySelector('[data-item-id="'+itemId+'"]');
  if(itemEl)itemEl.classList.toggle('has-qty',next>0);
  updateTotals();
  saveState();
}
function calcTotals(){
  let foodTotal=0,bevTotal=0;
  Object.entries(state.quantities).forEach(([id,qty])=>{
    if(qty<=0)return;
    const fi=MENU.food.find(i=>i.id===id);
    const bi=MENU.beverages.find(i=>i.id===id);
    if(fi)foodTotal+=fi.price*qty;
    else if(bi)bevTotal+=bi.price*qty;
  });
  return{foodTotal,bevTotal,grand:foodTotal+bevTotal};
}
function updateTotals(){
  const{grand}=calcTotals();
  document.getElementById('footer-total').textContent='€'+grand.toFixed(0);
}
function resetAll(){
  if(!confirm(state.lang==='ES'?'¿Borrar todo y empezar de nuevo?':'Clear everything and start fresh?'))return;
  state.quantities={};
  ['client-name','client-date','client-guests','client-location','client-phone'].forEach(id=>{document.getElementById(id).value='';});
  saveState();
  renderMenu();
  toast(state.lang==='ES'?'Limpiado':'Cleared');
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function buildPdfHTML(){
  const lang=state.lang;
  const C=COPY[lang];
  const{foodTotal,bevTotal,grand}=calcTotals();
  const name=document.getElementById('client-name').value||'—';
  const date=document.getElementById('client-date').value||'—';
  const formattedDate=date!=='—'?new Date(date).toLocaleDateString(lang==='ES'?'es-ES':'en-GB',{day:'numeric',month:'long',year:'numeric'}):'—';
  const guests=document.getElementById('client-guests').value||'—';
  const location=document.getElementById('client-location').value||'—';
  const phone=document.getElementById('client-phone').value||'—';
  const time=document.getElementById('client-time').value;
  const selectedFood=MENU.food.filter(i=>(state.quantities[i.id]||0)>0);
  const selectedBev=MENU.beverages.filter(i=>(state.quantities[i.id]||0)>0);
  const groupByCategory=(items)=>{const g={};items.forEach(i=>{if(!g[i.cat])g[i.cat]=[];g[i.cat].push(i);});return g;};
  const foodGroups=groupByCategory(selectedFood);
  const bevGroups=groupByCategory(selectedBev);
  const renderItemRow=(item)=>{
    const qty=state.quantities[item.id];
    const subtotal=qty*item.price;
    const iName=lang==='ES'?item.name_es:item.name_en;
    const iUnit=lang==='ES'?item.unit_es:item.unit_en;
    return `<div class="pdf-item"><div class="pdf-item-name">${iName} <span class="pdf-item-unit">· ${iUnit}</span></div><div class="pdf-item-qty">×${qty}</div><div class="pdf-item-unit">@ €${item.price.toFixed(2)}</div><div class="pdf-item-total">€${subtotal.toFixed(2)}</div></div>`;
  };
  const renderGroupHTML=(groups,order)=>{
    if(Object.keys(groups).length===0)return '';
    return order.filter(cat=>groups[cat]).map(cat=>`<div class="pdf-menu-category"><div class="pdf-category-name">${cat}</div>${groups[cat].map(renderItemRow).join('')}</div>`).join('');
  };
  return `<div class="pdf-header"><div class="pdf-logo-text"><span class="deli">Deli</span> Santa Maria</div><div class="pdf-slogan">${C.closingSlogan}</div><div class="pdf-subtitle">${C.eventProposal}</div></div><div class="pdf-section"><div class="pdf-client-grid"><div class="pdf-field"><div class="pdf-field-label">${C.clientName}</div><div class="pdf-field-value">${name}</div></div><div class="pdf-field"><div class="pdf-field-label">${C.eventDate}</div><div class="pdf-field-value">${formattedDate}</div></div><div class="pdf-field"><div class="pdf-field-label">${C.location}</div><div class="pdf-field-value">${location}</div></div><div class="pdf-field"><div class="pdf-field-label">${C.guests}</div><div class="pdf-field-value">${guests}</div></div><div class="pdf-field"><div class="pdf-field-label">${C.timeOfDay}</div><div class="pdf-field-value">${time}</div></div><div class="pdf-field"><div class="pdf-field-label">${C.phone}</div><div class="pdf-field-value">${phone}</div></div></div></div>${selectedFood.length>0?`<div class="pdf-section"><div class="pdf-section-title">${C.yourTable}</div>${renderGroupHTML(foodGroups,FOOD_CATEGORIES)}</div>`:''}${selectedBev.length>0?`<div class="pdf-section"><div class="pdf-section-title">${C.yourBeverages}</div>${renderGroupHTML(bevGroups,BEVERAGE_CATEGORIES)}</div>`:''}<div class="pdf-section"><div class="pdf-section-title">${C.investment}</div><div class="pdf-summary">${foodTotal>0?`<div class="pdf-summary-row"><span>${C.food}</span><span>€${foodTotal.toFixed(2)}</span></div>`:''}${bevTotal>0?`<div class="pdf-summary-row"><span>${C.beverages}</span><span>€${bevTotal.toFixed(2)}</span></div>`:''}<div class="pdf-summary-row total"><span>${C.totalEvent}</span><span class="amount">€${grand.toFixed(2)}</span></div></div></div><div class="pdf-section"><div class="pdf-section-title">${C.howItWorks}</div><div class="pdf-how"><ul>${C.howItems.map(item=>`<li>${item}</li>`).join('')}</ul></div></div><div class="pdf-section"><div class="pdf-section-title">${C.toReserve}</div><div class="pdf-how" style="font-size:14px;text-align:center;padding:16px 0;">${C.reserveText.replace(/\n/g,'<br>')}</div></div><div class="pdf-footer">${C.closing}<div class="signature">${C.closingSlogan}</div></div>`;
}
async function generatePDF(){
  const{grand}=calcTotals();
  if(grand===0){toast(state.lang==='ES'?'Añade al menos un plato':'Add at least one item');return;}
  const name=document.getElementById('client-name').value||'Client';
  const date=document.getElementById('client-date').value||new Date().toISOString().slice(0,10);
  const fileName=COPY[state.lang].fileName+'_'+name.replace(/\s+/g,'_')+'_'+date;
  const pdfOutput=document.getElementById('pdf-output');
  pdfOutput.innerHTML=buildPdfHTML();
  if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(e){}}
  await new Promise(resolve=>setTimeout(resolve,100));
  const originalTitle=document.title;
  document.title=fileName;
  toast(state.lang==='ES'?'Selecciona "Guardar como PDF"':'Choose "Save as PDF"');
  await new Promise(resolve=>setTimeout(resolve,400));
  window.print();
  setTimeout(()=>{document.title=originalTitle;},2000);
}
document.getElementById('proposal-lang').addEventListener('change',(e)=>{state.lang=e.target.value;renderMenu();saveState();});
['client-name','client-date','client-guests','client-location','client-phone','client-time','proposal-lang'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('input',()=>{state[id]=el.value;saveState();});
});
loadState();
['client-name','client-date','client-guests','client-location','client-phone','client-time','proposal-lang'].forEach(id=>{
  if(state[id]){const el=document.getElementById(id);if(el)el.value=state[id];}
});
renderMenu();
</script>
